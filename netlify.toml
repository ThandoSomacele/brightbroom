[build]
  command = "pnpm install --frozen-lockfile --prod=false && ./netlify/scripts/pre-build.sh && pnpm exec svelte-kit sync && pnpm run build && ./netlify/scripts/deploy-db.sh"
  publish = ".svelte-kit/netlify"
  functions = "netlify/functions"

[build.environment]
  # pnpm 11 requires Node >= 22.13 (uses the node:sqlite built-in)
  NODE_VERSION = "22"
  # Install devDependencies even when NODE_ENV=production (needed for the build).
  PNPM_FLAGS = "--prod=false"

[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "@node-rs/argon2",
    "oslo",
    "@oslojs/crypto",
    "@oslojs/encoding",
    "react",
    "react-dom",
    "react/jsx-runtime"
  ]

# Note: Scheduled function 'recurring-charge-cron' is configured via Netlify UI
# Schedule: "0 2 * * *" (daily at 2 AM UTC)
# This processes recurring subscription charges



# Set CORS headers for PayFast IPN requests
[[headers]]
  for = "/.netlify/functions/payfast-ipn"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[context.production]
  environment = { NODE_ENV = "production" }
  
[context.development]
  command = "pnpm install --frozen-lockfile --prod=false && ./netlify/scripts/pre-build.sh && pnpm exec svelte-kit sync && pnpm run build && GENERATE_MIGRATIONS=true ./netlify/scripts/deploy-db.sh"
  environment = { NODE_ENV = "development" }

[context.branch-deploy]
  command = "pnpm install --frozen-lockfile --prod=false && ./netlify/scripts/pre-build.sh && pnpm exec svelte-kit sync && pnpm run build && GENERATE_MIGRATIONS=true ./netlify/scripts/deploy-db.sh"
  environment = { NODE_ENV = "development" }
